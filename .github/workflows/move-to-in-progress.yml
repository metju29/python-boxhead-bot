name: Move issue to In Progress on branch creation

on:
  create:

jobs:
  move-to-in-progress:
    if: github.ref_type == 'branch' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number from branch name
        id: extract
        run: |
          ISSUE_NUM=$(echo "${{ github.ref_name }}" | grep -oE '^[0-9]+')
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Move project item to In Progress
        if: steps.extract.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOXHEAD_PROJECT_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.issue_number }}');
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $issue: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issue) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue: issueNumber
            });

            const projectId = 'PVT_kwHOBMHU_s4Bb1Xg';
            const item = repository.issue.projectItems.nodes.find(
              n => n.project.id === projectId
            );

            if (!item) {
              console.log(`Issue #${issueNumber} not in project — skipping`);
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId: 'PVT_kwHOBMHU_s4Bb1Xg',
              fieldId: 'PVTSSF_lAHOBMHU_s4Bb1XgzhWi5BI',
              itemId: item.id,
              optionId: '47fc9ee4'
            });

            console.log(`✓ Issue #${issueNumber} moved to In Progress`);
